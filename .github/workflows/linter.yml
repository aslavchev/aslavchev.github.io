name: Workflow Validation (YAML)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel outdated workflow runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: github/super-linter/slim@v6
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Enable YAML validation only
          # YAML: Protects workflow files from syntax errors (high value)
          # HTML/CSS/JS: Disabled - Jekyll Liquid templating incompatible with standard linters
          # Markdown: Disabled - Style nitpicks with low value (html-proofer in Epic 1.3 provides real checks)
          # This is pragmatic for Jekyll sites - use html-proofer for content validation
          VALIDATE_YAML: true

          # Configuration files
          HTMLHINT_CONFIG_FILE: .htmlhintrc

          # Linter settings
          LINTER_RULES_PATH: /

          # Exclude vendor code, minified files, theme files, and build artifacts from linting
          # These are third-party libraries/themes that don't need to meet our quality standards
          FILTER_REGEX_EXCLUDE: .*/_site/.*|.*\.min\..*|.*/font-awesome/.*|.*bootstrap.*|.*jquery.*|.*_includes/css/main\.css.*|.*_includes/css/bootstrap.*|.*freelancer.*|.*cbp.*|.*classie.*|.*jqBootstrap.*|.*easing.*

          # Strict mode - fail on errors for OUR code only
          # (continue-on-error removed for quality enforcement)